<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Sistemas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23F06E0A'/%3E%3Ccircle cx='16' cy='16' r='11' fill='%23FFFCF7'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23F06E0A'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23FFFCF7'/%3E%3C/svg%3E" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F3EDE3;
    --surface: #FFFCF7;
    --surface2: #EDE6DB;
    --border: rgba(58, 51, 43, 0.1);
    --orange: #F06E0A;
    --orange-deep: #D45A08;
    --cream-highlight: #FFF9F0;
    --accent: var(--orange);
    --accent2: var(--orange-deep);
    --accent-glow: rgba(240, 110, 10, 0.14);
    --accent-soft: rgba(240, 110, 10, 0.18);
    --accent-ring: rgba(240, 110, 10, 0.2);
    --text: #3A332B;
    --muted: #756A5C;
    --danger: #c43c3c;
    --success: #2d8a5e;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Textura suave no creme */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
  }

  /* HEADER */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 252, 247, 0.88);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: 0 2px 12px rgba(240, 110, 10, 0.2);
  }

  .logo-icon svg {
    display: block;
    width: 40px;
    height: 40px;
  }

  .logo h1 {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo span {
    font-weight: 400;
    color: var(--muted);
  }

  .btn-primary {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(145deg, var(--orange) 0%, var(--orange-deep) 100%);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: var(--font-body);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 10px rgba(240, 110, 10, 0.28);
  }

  .btn-primary:hover {
    opacity: 0.96;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(240, 110, 10, 0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
    pointer-events: none;
  }

  .delete-confirm-instruction {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 6px;
  }

  .delete-confirm-keyword {
    color: var(--orange);
    font-weight: 700;
  }

  .delete-confirm-hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 18px;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .section-title {
    font-family: var(--font-head);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 100px 24px;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 20px;
    opacity: 0.4;
  }

  .empty-state h2 {
    font-family: var(--font-head);
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--muted);
  }

  .empty-state p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  /* COMPANY GRID */
  .companies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  .company-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .company-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--orange-deep));
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .company-card:hover {
    border-color: var(--accent-ring);
    transform: translateY(-3px);
    box-shadow: 0 14px 36px rgba(58, 51, 43, 0.08), 0 0 0 1px rgba(240, 110, 10, 0.12);
  }

  .company-card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .company-avatar {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 800;
    flex-shrink: 0;
    color: #fff;
  }

  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .company-card:hover .card-actions { opacity: 1; }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    transition: all 0.15s;
  }

  .icon-btn:hover { color: var(--text); border-color: rgba(58, 51, 43, 0.15); }
  .icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); }

  .company-name {
    font-family: var(--font-head);
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 5px;
    letter-spacing: -0.01em;
  }

  .company-meta {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .links-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }

  .link-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }

  .link-chip-more {
    background: linear-gradient(135deg, rgba(240, 110, 10, 0.1), rgba(212, 90, 8, 0.08));
    border-color: rgba(240, 110, 10, 0.22);
    color: var(--orange-deep);
    font-weight: 500;
  }

  /* DETAIL VIEW */
  .detail-view {
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.875rem;
    cursor: pointer;
    padding: 0;
    margin-bottom: 32px;
    transition: color 0.15s;
  }

  .back-btn:hover { color: var(--text); }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .detail-title-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .detail-avatar {
    width: 56px;
    height: 56px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }

  .detail-company-name {
    font-family: var(--font-head);
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .detail-count {
    font-size: 0.875rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* LINKS LIST */
  .links-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .link-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .link-card:hover {
    border-color: var(--accent-ring);
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(58, 51, 43, 0.07);
  }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(145deg, rgba(240, 110, 10, 0.12), rgba(212, 90, 8, 0.08));
    border: 1px solid rgba(240, 110, 10, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .link-info { flex: 1; min-width: 0; }

  .link-label {
    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-desc {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-card a:hover .link-arrow { color: var(--orange); transform: translateX(3px); }

  .link-arrow {
    color: var(--muted);
    font-size: 0.9rem;
    transition: color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .link-delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    transition: all 0.15s;
  }

  .link-card:hover .link-delete-btn {
    color: var(--muted);
    border-color: var(--border);
    background: var(--surface2);
  }

  .link-delete-btn:hover { color: var(--danger) !important; border-color: var(--danger) !important; }

  /* EMPTY LINKS */
  .empty-links {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .empty-links .empty-icon { font-size: 2rem; }

  /* MODALS */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(58, 51, 43, 0.42);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--cream-highlight);
    border: 1px solid rgba(58, 51, 43, 0.1);
    border-radius: 18px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
    animation: scaleIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 64px rgba(58, 51, 43, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  input, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }

  input:focus, textarea:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  input::placeholder, textarea::placeholder { color: var(--muted); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-ghost {
    padding: 10px 18px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: rgba(240, 110, 10, 0.35); color: var(--text); background: rgba(240, 110, 10, 0.06); }

  .color-picker-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }

  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: var(--text); box-shadow: 0 0 0 1px var(--orange); transform: scale(1.1); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.875rem;
    color: var(--text);
    z-index: 999;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    white-space: nowrap;
    box-shadow: 0 10px 36px rgba(58, 51, 43, 0.12);
  }

  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(20px); } }

  /* SEARCH */
  .search-bar {
    position: relative;
    margin-bottom: 32px;
  }

  .search-bar input {
    padding-left: 40px;
    background: var(--surface);
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .search-clear:hover { color: var(--text); background: rgba(240, 110, 10, 0.12); }

  .search-bar input.has-clear { padding-right: 42px; }

  .search-highlight {
    background: rgba(240, 110, 10, 0.22);
    color: var(--text);
    font-weight: 700;
    border-radius: 3px;
    padding: 0 3px;
  }

  .dashboard-hint {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.55;
    margin: -12px 0 22px;
    max-width: 640px;
  }

  .search-summary {
    font-family: var(--font-head);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .dashboard-block {
    margin-bottom: 36px;
  }

  .dashboard-block:last-child { margin-bottom: 0; }

  .dashboard-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    align-items: stretch;
  }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .cat-card:hover {
    box-shadow: 0 12px 32px rgba(58, 51, 43, 0.08);
    transform: translateY(-2px);
  }

  .cat-card-header {
    padding: 18px 16px;
    text-align: center;
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 0.95rem;
    color: #fff;
    letter-spacing: -0.02em;
    min-height: 148px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }

  .cat-card-body {
    padding: 16px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .cat-card-name {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 4px;
  }

  .cat-card-meta {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .cat-card-actions {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
    flex-wrap: wrap;
    margin-top: auto;
    flex-shrink: 0;
  }

  .btn-block {
    flex: 1;
    min-width: 100px;
    justify-content: center;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .link-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    position: relative;
  }

  .link-tile:hover {
    border-color: var(--accent-ring);
    box-shadow: 0 10px 28px rgba(58, 51, 43, 0.07);
    transform: translateY(-2px);
  }

  .link-tile-thumb-wrap {
    height: 148px;
    flex-shrink: 0;
    background: linear-gradient(145deg, var(--surface2), var(--cream-highlight));
    position: relative;
  }

  .link-tile-thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .link-tile-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    opacity: 0.35;
  }

  .link-tile-body {
    padding: 14px 16px 10px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .link-tile-cat {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .link-tile-title {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    margin-bottom: 6px;
    color: var(--text);
  }

  .link-tile-desc {
    font-size: 0.82rem;
    color: var(--muted);

<script>
const COLORS = [
  'linear-gradient(145deg,#F06E0A,#D45A08)',
  'linear-gradient(145deg,#EA580C,#C2410C)',
  'linear-gradient(145deg,#F59E0B,#D97706)',
  'linear-gradient(145deg,#E85D04,#9A3412)',
  'linear-gradient(145deg,#FB923C,#EA580C)',
  'linear-gradient(145deg,#78716C,#57534E)',
  'linear-gradient(145deg,#0D9488,#0F766E)',
  'linear-gradient(145deg,#CA8A04,#A16207)',
];

const LINK_ICONS = ['🖥️','📊','📈','🔐','📋','⚙️','🗃️','🧾','📦','🔍','💼','📡'];

let linkThumbDraft = null;

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escapeAttr(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;');
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, q) {
  const t = String(text ?? '');
  const needle = (q || '').trim();
  if (!needle) return escapeHtml(t);
  let re;
  try {
    re = new RegExp(escapeRegex(needle), 'gi');
  } catch {
    return escapeHtml(t);
  }
  const parts = [];
  let last = 0;
  const copy = t;
  let m;
  while ((m = re.exec(copy)) !== null) {
    parts.push(escapeHtml(copy.slice(last, m.index)));
    parts.push('<mark class="search-highlight">' + escapeHtml(m[0]) + '</mark>');
    last = m.index + m[0].length;
  }
  parts.push(escapeHtml(copy.slice(last)));
  return parts.join('');
}

function linkMatchesQuery(link, q) {
  const ql = (q || '').trim().toLowerCase();
  if (!ql) return false;
  return (
    (link.label || '').toLowerCase().includes(ql) ||
    (link.desc || '').toLowerCase().includes(ql)
  );
}

function compressImageFile(file) {
  return new Promise((resolve) => {
    if (!file || !file.type.startsWith('image/')) {
      resolve(null);
      return;
    }
    const img = new Image();
    const u = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(u);
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      const max = 960;
      if (w > max) {
        h = Math.round((h * max) / w);
        w = max;
      }
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#FFFCF7';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      try {
        resolve(c.toDataURL('image/jpeg', 0.82));
      } catch {
        resolve(null);
      }
    };
    img.onerror = () => {
      URL.revokeObjectURL(u);
      resolve(null);
    };
    img.src = u;
  });
}

function buildLinkTileElement(company, link, query) {
  const tile = document.createElement('div');
  tile.className = 'link-tile';

  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'link-tile-thumb-wrap';
  if (link.thumbnail) {
    const img = document.createElement('img');
    img.src = link.thumbnail;
    img.alt = '';
    thumbWrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'link-tile-thumb-placeholder';
    ph.textContent = link.icon || '🖥️';
    thumbWrap.appendChild(ph);
  }
  tile.appendChild(thumbWrap);

  const body = document.createElement('div');
  body.className = 'link-tile-body';
  body.innerHTML = `
    <div class="link-tile-cat">${highlightText(company.name, query)}</div>
    <div class="link-tile-title">${highlightText(link.label, query)}</div>
    <div class="link-tile-desc">${highlightText((link.desc || link.url || '').trim(), query)}</div>
  `;
  tile.appendChild(body);

  const foot = document.createElement('div');
  foot.className = 'link-tile-footer';
  const a = document.createElement('a');
  a.href = link.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.className = 'btn-primary btn-block';
  a.textContent = 'Acessar';
  const tools = document.createElement('div');
  tools.className = 'link-tile-tools';
  const editBtn = document.createElement('button');
  editBtn.type = 'button';
  editBtn.className = 'icon-btn';
  editBtn.title = 'Editar';
  editBtn.textContent = '✎';
  editBtn.addEventListener('click', (e) => {
    e.preventDefault();
    openEditLinkModal(company.id, link.id);
  });
  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.className = 'icon-btn danger';
  delBtn.title = 'Excluir';
  delBtn.textContent = '🗑';
  delBtn.addEventListener('click', (e) => {
    e.preventDefault();
    deleteLink(company.id, link.id);
  });
  tools.appendChild(editBtn);
  tools.appendChild(delBtn);
  foot.appendChild(a);
  foot.appendChild(tools);
  tile.appendChild(foot);

  return tile;
}

// --- API: dados no servidor (PostgreSQL) — mesma visão para toda a equipe ---
const API_BASE = '';

async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (options.body && typeof options.body === 'string') {
    headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(API_BASE + path, { ...options, headers });
  const text = await res.text();
  let data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch {
    data = { raw: text };
  }
  if (!res.ok) {
    const msg = data && data.error ? data.error : `Erro ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

const DELETE_CONFIRM_PHRASE = 'Confirmar Exclusão';

function openDeleteConfirmModal({ title, hint, onConfirm }) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">${title}</div>
      <p class="delete-confirm-hint">${hint}</p>
      <p class="delete-confirm-instruction">Para se certificar dessa exclusão, digite abaixo <span class="delete-confirm-keyword">Confirmar Exclusão</span></p>
      <div class="form-group">
        <label>Digite a frase acima</label>
        <input type="text" id="deleteConfirmInput" autocomplete="off" placeholder="Confirmar Exclusão">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="deleteConfirmCancel">Cancelar</button>
        <button type="button" class="btn-primary" id="deleteConfirmSubmit" disabled>Excluir definitivamente</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  const input = overlay.querySelector('#deleteConfirmInput');
  const submitBtn = overlay.querySelector('#deleteConfirmSubmit');

  function syncSubmit() {
    const ok = input.value === DELETE_CONFIRM_PHRASE;
    submitBtn.disabled = !ok;
  }

  input.addEventListener('input', syncSubmit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') overlay.remove();
  });
  input.focus();

  overlay.querySelector('#deleteConfirmCancel').addEventListener('click', () => overlay.remove());

  submitBtn.addEventListener('click', async () => {
    if (input.value !== DELETE_CONFIRM_PHRASE) return;
    submitBtn.disabled = true;
    try {
      await onConfirm();
      overlay.remove();
    } catch (e) {
      showToast('⚠️ ' + (e.message || 'Erro ao excluir'));
      submitBtn.disabled = false;
    }
  });
}

let companies = [];
let loadError = null;
let loading = true;

async function loadCompanies() {
  loading = true;
  loadError = null;
  try {
    const data = await apiFetch('/api/companies');
    companies = data.companies || [];
  } catch (e) {
    loadError = e.message || 'Falha ao carregar';
    companies = [];
  } finally {
    loading = false;
  }
}

// --- STATE ---
let state = {
  view: 'home', // 'home' | 'detail'
  activeCompany: null,
  search: '',
};

// --- RENDER ---
function getInitials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function render() {
  const app = document.getElementById('app');
  if (loading) {
    app.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <h2>Carregando…</h2>
        <p style="color:var(--muted);margin-top:8px;">Buscando empresas e links no servidor.</p>
      </div>`;
    return;
  }
  if (loadError) {
    app.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h2>Não foi possível carregar</h2>
        <p style="color:var(--muted);margin-top:8px;max-width:420px;">${loadError.replace(/</g, '&lt;')}</p>
        <button class="btn-primary" style="margin-top:20px" id="retryLoadBtn">Tentar de novo</button>
      </div>`;
    document.getElementById('retryLoadBtn').addEventListener('click', () => {
      loadCompanies().then(() => render());
    });
    return;
  }
  if (state.view === 'home') renderHome(app);
  else renderDetail(app);
}

function renderHome(app) {
  const q = state.search.trim();
  const ql = q.toLowerCase();

  app.innerHTML = '';

  if (companies.length > 0) {
    const searchEl = document.createElement('div');
    searchEl.className = 'search-bar';
    const hasClear = q.length > 0;
    searchEl.innerHTML = `
      <span class="search-icon">🔍</span>
      <input type="text" class="${hasClear ? 'has-clear' : ''}" placeholder="Buscar por empresa ou sistema..." id="searchInput" value="${escapeAttr(q)}">
      ${hasClear ? '<button type="button" class="search-clear" id="searchClearBtn" aria-label="Limpar busca">✕</button>' : ''}
    `;
    app.appendChild(searchEl);
    searchEl.querySelector('#searchInput').addEventListener('input', (e) => {
      state.search = e.target.value;
      render();
    });
    const clearBtn = searchEl.querySelector('#searchClearBtn');
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        state.search = '';
        render();
      });
    }
    setTimeout(() => {
      const inp = document.getElementById('searchInput');
      if (inp) {
        inp.focus();
        inp.setSelectionRange(inp.value.length, inp.value.length);
      }
    }, 10);

    const hint = document.createElement('p');
    hint.className = 'dashboard-hint';
    hint.innerHTML =
      'Busque por <strong>nome da empresa</strong> ou por <strong>título / descrição</strong> dos sistemas.';
    app.appendChild(hint);
  }

  if (companies.length === 0) {
    app.innerHTML += `
      <div class="empty-state">
        <div class="empty-icon">🏢</div>
        <h2>Nenhuma empresa ainda</h2>
        <p>Comece adicionando uma empresa para organizar seus sistemas e links.</p>
        <button class="btn-primary" onclick="openAddCompanyModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Adicionar Empresa
        </button>
      </div>`;
    return;
  }

  if (!q) {
    const label = document.createElement('p');
    label.className = 'section-title';
    label.textContent = `${companies.length} ${companies.length === 1 ? 'empresa' : 'empresas'}`;
    app.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'companies-grid';

    companies.forEach((company) => {
      const card = document.createElement('div');
      card.className = 'company-card';
      const linkCount = (company.links || []).length;
      const preview = (company.links || []).slice(0, 3);
      const extra = linkCount - 3;

      card.innerHTML = `
        <div class="card-header">
          <div class="company-avatar" style="background:${company.color}">${getInitials(company.name)}</div>
          <div class="card-actions">
            <button class="icon-btn" title="Editar empresa" onclick="event.stopPropagation(); openEditCompanyModal('${company.id}')">✎</button>
            <button class="icon-btn danger" title="Excluir empresa" onclick="event.stopPropagation(); deleteCompany('${company.id}')">🗑</button>
          </div>
        </div>
        <div class="company-name">${escapeHtml(company.name)}</div>
        <div class="company-meta">${linkCount} ${linkCount === 1 ? 'sistema' : 'sistemas'}</div>
        ${linkCount > 0 ? `
          <div class="links-preview">
            ${preview.map((l) => `<span class="link-chip" title="${escapeAttr(l.label)}">${escapeHtml(l.label)}</span>`).join('')}
            ${extra > 0 ? `<span class="link-chip link-chip-more">+${extra}</span>` : ''}
          </div>
        ` : ''}
      `;

      card.addEventListener('click', () => {
        state.view = 'detail';
        state.activeCompany = company.id;
        render();
      });

      grid.appendChild(card);
    });

    app.appendChild(grid);
    return;
  }

  const blocks = [];
  let totalCats = 0;
  let totalLinks = 0;

  companies.forEach((company) => {
    const nameHit = company.name.toLowerCase().includes(ql);
    const links = company.links || [];
    const linkHits = nameHit ? links.slice() : links.filter((l) => linkMatchesQuery(l, q));
    if (!nameHit && linkHits.length === 0) return;
    totalCats += 1;
    totalLinks += linkHits.length;
    blocks.push({ company, linkHits });
  });

  if (blocks.length === 0) {
    const p = document.createElement('p');
    p.style.cssText = 'color:var(--muted);text-align:center;padding:60px 0;';
    p.textContent = 'Nenhum resultado para essa busca.';
    app.appendChild(p);
    return;
  }

  const summary = document.createElement('p');
  summary.className = 'search-summary';
  summary.textContent = `${totalCats} ${totalCats === 1 ? 'categoria' : 'categorias'} · ${totalLinks} ${totalLinks === 1 ? 'projeto' : 'projetos'}`;
  app.appendChild(summary);

  blocks.forEach(({ company, linkHits }) => {
    const block = document.createElement('div');
    block.className = 'dashboard-block';
    const row = document.createElement('div');
    row.className = 'dashboard-row';

    const cat = document.createElement('div');
    cat.className = 'cat-card';
    cat.innerHTML = `
      <div class="cat-card-header" style="background:${company.color}">${highlightText(company.name, q)}</div>
      <div class="cat-card-body">
        <div class="cat-card-name">${highlightText(company.name, q)}</div>
        <div class="cat-card-meta">${(company.links || []).length} ${(company.links || []).length === 1 ? 'sistema' : 'sistemas'}</div>
      </div>
      <div class="cat-card-actions">
        <button type="button" class="btn-primary btn-block" onclick="openCompanyFromSearch('${company.id}')">Abrir</button>
        <button type="button" class="btn-ghost btn-block" onclick="openEditCompanyModal('${company.id}')">Editar</button>
      </div>
    `;
    row.appendChild(cat);

    linkHits.forEach((link) => {
      row.appendChild(buildLinkTileElement(company, link, q));
    });

    block.appendChild(row);
    app.appendChild(block);
  });
}

window.openCompanyFromSearch = function (id) {
  state.view = 'detail';
  state.activeCompany = id;
  render();
};

function renderDetail(app) {
  const company = companies.find(c => c.id === state.activeCompany);
  if (!company) { state.view = 'home'; render(); return; }

  app.innerHTML = '';

  const detail = document.createElement('div');
  detail.className = 'detail-view';

  const linkCount = (company.links || []).length;

  detail.innerHTML = `
    <button class="back-btn" onclick="goHome()">← Voltar</button>
    <div class="detail-header">
      <div class="detail-title-group">
        <div class="detail-avatar" style="background:${company.color}">${getInitials(company.name)}</div>
        <div>
          <div class="detail-company-name">${escapeHtml(company.name)}</div>
          <div class="detail-count">${linkCount} ${linkCount === 1 ? 'sistema cadastrado' : 'sistemas cadastrados'}</div>
        </div>
      </div>
      <div class="header-actions" style="justify-content:flex-start">
        <button type="button" class="btn-ghost" onclick="openEditCompanyModal('${company.id}')">Editar empresa</button>
        <button class="btn-primary" onclick="openAddLinkModal('${company.id}')">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Novo link
        </button>
      </div>
    </div>
    <div class="links-list" id="linksList"></div>
  `;

  app.appendChild(detail);

  const list = document.getElementById('linksList');

  if ((company.links || []).length === 0) {
    list.innerHTML = `
      <div class="empty-links">

        <p style="font-size:0.8rem;margin-top:4px;">Clique em "Adicionar Link" para começar.</p>
      </div>`;
    return;
  }

  company.links.forEach((link) => {
    list.appendChild(buildLinkTileElement(company, link, ''));
  });
}

function goHome() {
  state.view = 'home';
  state.activeCompany = null;
  render();
}

// --- MODALS ---
function openAddCompanyModal() {
  let selectedColor = COLORS[0];

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Nova Empresa</div>
      <div class="form-group">
        <label>Nome da Empresa</label>
        <input type="text" id="companyNameInput" placeholder="Ex: Acme Corp" autofocus maxlength="50">
      </div>
      <div class="form-group">
        <label>Cor</label>
        <div class="color-picker-row">
          ${COLORS.map((c,i)=>`<div class="color-dot ${i===0?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`).join('')}
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" onclick="submitCompany()">Criar Empresa</button>
      </div>

window.selectColor = function(el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
};

window.submitCompany = async function() {
  const name = document.getElementById('companyNameInput').value.trim();
  if (!name) { showToast('⚠️ Digite o nome da empresa'); return; }

  const selectedDot = document.querySelector('.color-dot.selected');
  const color = selectedDot ? selectedDot.dataset.color : COLORS[0];

  try {
    await apiFetch('/api/companies', { method: 'POST', body: JSON.stringify({ name, color }) });
    closeModal();
    showToast('✅ Empresa criada!');
    await loadCompanies();
    render();
  } catch (e) {
    showToast('⚠️ ' + (e.message || 'Erro ao criar empresa'));
  }
};

window.openEditCompanyModal = function(companyId) {
  const c = companies.find((x) => x.id === companyId);
  if (!c) return;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  const inPalette = COLORS.includes(c.color);
  const extraDot = !inPalette
    ? `<div class="color-dot selected" style="background:${c.color}" data-color="${escapeAttr(c.color)}" onclick="selectColor(this)" title="Cor atual"></div>`
    : '';
  const colorRows =
    extraDot +
    COLORS.map((col) => {
      const sel = inPalette && c.color === col ? 'selected' : '';
      return `<div class="color-dot ${sel}" style="background:${col}" data-color="${escapeAttr(col)}" onclick="selectColor(this)"></div>`;
    }).join('');
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Editar empresa</div>
      <div class="form-group">
        <label>Nome da Empresa</label>
        <input type="text" id="companyNameInput" value="${escapeAttr(c.name)}" maxlength="50">
      </div>
      <div class="form-group">
        <label>Cor</label>
        <div class="color-picker-row">${colorRows}</div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" onclick="submitCompanyUpdate('${companyId}')">Salvar</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
};

window.submitCompanyUpdate = async function(companyId) {
  const name = document.getElementById('companyNameInput').value.trim();
  if (!name) { showToast('⚠️ Digite o nome da empresa'); return; }
  const selectedDot = document.querySelector('.color-dot.selected');
  const color = selectedDot ? selectedDot.dataset.color : COLORS[0];
  try {
    await apiFetch('/api/companies/' + encodeURIComponent(companyId), {
      method: 'PUT',
      body: JSON.stringify({ name, color }),
    });
    closeModal();
    showToast('✅ Empresa atualizada!');
    await loadCompanies();
    render();
  } catch (e) {
    showToast('⚠️ ' + (e.message || 'Erro ao atualizar empresa'));
  }
};

function syncLinkThumbPreview(overlay) {
  const wrap = overlay.querySelector('#linkThumbPreview');
  const img = overlay.querySelector('#linkThumbPreviewImg');
  const rm = overlay.querySelector('#linkThumbRemove');
  if (!wrap || !img || !rm) return;
  if (linkThumbDraft) {
    wrap.style.display = 'block';
    img.src = linkThumbDraft;
    rm.style.display = 'inline-flex';
  } else {
    wrap.style.display = 'none';
    rm.style.display = 'none';
    img.removeAttribute('src');
  }
}

function openLinkFormModal(companyId, existingLink) {
  linkThumbDraft = existingLink?.thumbnail || null;
  const isEdit = !!existingLink;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  const lid = existingLink ? existingLink.id : '';
  const iconsHtml = LINK_ICONS.map((ic, i) => {
    const sel = existingLink && existingLink.icon === ic ? 'selected' : !existingLink && i === 0 ? 'selected' : '';
    return `<div class="color-dot ${sel}" style="background:var(--surface2);font-size:1rem;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)" data-icon="${ic}" onclick="selectIcon(this)">${ic}</div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="modal modal-wide">
      <div class="modal-title">${isEdit ? 'Editar link' : 'Novo link'}</div>
      <div class="form-group">
        <label>Miniatura (print do sistema, opcional)</label>
        <div class="thumb-input-row">
          <input type="file" id="linkThumbInput" accept="image/*">
          <button type="button" class="btn-ghost" id="linkThumbRemove" style="display:none">Remover imagem</button>
        </div>
        <div id="linkThumbPreview" class="thumb-preview-wrap" style="display:none">
          <img id="linkThumbPreviewImg" alt="">
        </div>
      </div>
      <div class="form-group">
        <label>Nome do sistema</label>
        <input type="text" id="linkLabelInput" placeholder="Ex: Dashboard de Vendas" autofocus maxlength="60" value="${escapeAttr(existingLink?.label || '')}">
      </div>
      <div class="form-group">
        <label>URL</label>
        <input type="url" id="linkUrlInput" placeholder="https://..." value="${escapeAttr(existingLink?.url || '')}">
      </div>
      <div class="form-group">
        <label>Descrição (opcional)</label>
        <textarea id="linkDescInput" rows="2" placeholder="Ex: Comercial, Financeiro...">${escapeHtml(existingLink?.desc || '')}</textarea>
      </div>
      <div class="form-group">
        <label>Ícone (quando não houver miniatura)</label>
        <div class="color-picker-row" style="flex-wrap:wrap">${iconsHtml}</div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" id="linkFormSubmitBtn">${isEdit ? 'Salvar alterações' : 'Adicionar link'}</button>
      </div>
    </div>
  `;

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
  syncLinkThumbPreview(overlay);

  const thumbInput = overlay.querySelector('#linkThumbInput');
  thumbInput.addEventListener('change', async () => {
    const f = thumbInput.files && thumbInput.files[0];
    if (!f) return;
    const data = await compressImageFile(f);
    if (data) {
      linkThumbDraft = data;
      syncLinkThumbPreview(overlay);
      showToast('✅ Imagem anexada');
    } else {
      showToast('⚠️ Não foi possível ler a imagem');
    }
    thumbInput.value = '';
  });

  overlay.querySelector('#linkThumbRemove').addEventListener('click', () => {
    linkThumbDraft = null;
    syncLinkThumbPreview(overlay);
  });

  overlay.querySelector('#linkFormSubmitBtn').addEventListener('click', () => {
    submitLinkForm(companyId, isEdit ? lid : null);
  });
}

function openAddLinkModal(companyId) {
  openLinkFormModal(companyId, null);
}

window.openEditLinkModal = function(companyId, linkId) {
  const c = companies.find((x) => x.id === companyId);
  const link = c?.links?.find((l) => l.id === linkId);
  if (!link) return;
  openLinkFormModal(companyId, link);
};

window.selectIcon = function(el) {
  document.querySelectorAll('[data-icon]').forEach(d => {
    d.style.borderColor = 'var(--border)';
    d.classList.remove('selected');
  });
  el.style.borderColor = 'var(--accent)';
  el.classList.add('selected');
};

window.submitLinkForm = async function(companyId, linkId) {
  const label = document.getElementById('linkLabelInput').value.trim();
  let url = document.getElementById('linkUrlInput').value.trim();
  const desc = document.getElementById('linkDescInput').value.trim();
  const selectedIcon = document.querySelector('[data-icon].selected');
  const icon = selectedIcon ? selectedIcon.dataset.icon : '🖥️';

  if (!label) { showToast('⚠️ Digite o nome do sistema'); return; }
  if (!url) { showToast('⚠️ Digite a URL'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;

  const payload = { label, url, desc, icon, thumbnail: linkThumbDraft };

  try {
    if (linkId) {
      await apiFetch('/api/links/' + encodeURIComponent(linkId), {
        method: 'PUT',
        body: JSON.stringify(payload),
      });
      showToast('✅ Link atualizado!');
    } else {
      await apiFetch('/api/companies/' + encodeURIComponent(companyId) + '/links', {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      showToast('✅ Link adicionado!');
    }
    closeModal();
    await loadCompanies();
    render();
  } catch (e) {
    showToast('⚠️ ' + (e.message || 'Erro ao salvar link'));
  }
};

window.deleteCompany = function(id) {
  openDeleteConfirmModal({
    title: 'Excluir empresa',
    hint: 'A empresa e todos os sistemas (links) vinculados a ela serão removidos permanentemente.',
    onConfirm: async () => {
      await apiFetch('/api/companies/' + encodeURIComponent(id), { method: 'DELETE' });
      await loadCompanies();
      if (state.activeCompany === id) {
        state.view = 'home';
        state.activeCompany = null;
      }
      render();
      showToast('🗑 Empresa removida');
    },
  });
};

window.deleteLink = function(companyId, linkId) {
  openDeleteConfirmModal({
    title: 'Excluir link',
    hint: 'Este sistema será removido apenas desta empresa.',
    onConfirm: async () => {
      await apiFetch('/api/links/' + encodeURIComponent(linkId), { method: 'DELETE' });
      await loadCompanies();
      render();
      showToast('🗑 Link removido');
    },
  });
};

function closeModal() {
  const overlay = document.querySelector('.overlay');
  if (overlay) overlay.remove();
}

window.closeModal = closeModal;
window.openAddCompanyModal = openAddCompanyModal;
window.openAddLinkModal = openAddLinkModal;
window.goHome = goHome;

// --- TOAST ---
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// --- ADD COMPANY BUTTON ---
document.getElementById('addCompanyBtn').addEventListener('click', openAddCompanyModal);

// Init
render();
loadCompanies().then(() => render());
</script>
